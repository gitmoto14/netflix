<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SRE Intro Animation</title>
  <link rel="stylesheet" href="./style.css?v=50">
</head>
<body>

<div id="container">
  <div class="sre-row" id="sreRow"></div>
</div>

<script>
  const letters = ["S", "R", "E"];

  function createBrush() {
    let html = '<div class="effect-brush">';
    for (let i = 31; i >= 1; i--) {
      html += `<span class="fur-${i}"></span>`;
    }
    html += '</div>';
    return html;
  }

  function createLights() {
    let html = '<div class="effect-lumieres">';
    for (let i = 1; i <= 28; i++) {
      html += `<span class="lamp-${i}"></span>`;
    }
    html += '</div>';
    return html;
  }

  function createNetflixLetter(letter) {
    const el = document.createElement("netflixintro");
    el.setAttribute("letter", letter);

    el.innerHTML = `
      <div class="helper-1">
        ${createBrush()}
        ${createLights()}
      </div>
      <div class="helper-2">
        ${createBrush()}
      </div>
      <div class="helper-3">
        ${createBrush()}
      </div>
      <div class="helper-4">
        ${createBrush()}
      </div>
    `;

    return el;
  }

  const row = document.getElementById("sreRow");

  letters.forEach(letter => {
    row.appendChild(createNetflixLetter(letter));
  });
</script>

</body>
</html>
