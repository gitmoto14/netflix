<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SRE Netflix Intro</title>
  <link rel="stylesheet" href="./style.css?v=70">
</head>
<body>

<div id="container">
  <div class="sre-row">

    <netflixintro letter="S">
      <div class="helper-1"><div class="effect-brush"></div><div class="effect-lumieres"></div></div>
      <div class="helper-2"><div class="effect-brush"></div></div>
      <div class="helper-3"><div class="effect-brush"></div></div>
      <div class="helper-4"><div class="effect-brush"></div></div>
    </netflixintro>

    <netflixintro letter="R">
      <div class="helper-1"><div class="effect-brush"></div><div class="effect-lumieres"></div></div>
      <div class="helper-2"><div class="effect-brush"></div></div>
      <div class="helper-3"><div class="effect-brush"></div></div>
      <div class="helper-4"><div class="effect-brush"></div></div>
    </netflixintro>

    <netflixintro letter="E">
      <div class="helper-1"><div class="effect-brush"></div><div class="effect-lumieres"></div></div>
      <div class="helper-2"><div class="effect-brush"></div></div>
      <div class="helper-3"><div class="effect-brush"></div></div>
      <div class="helper-4"><div class="effect-brush"></div></div>
    </netflixintro>

  </div>
</div>

<script>
  document.querySelectorAll('.effect-brush').forEach(brush => {
    for (let i = 31; i >= 1; i--) {
      const span = document.createElement('span');
      span.className = `fur-${i}`;
      brush.appendChild(span);
    }
  });

  document.querySelectorAll('.effect-lumieres').forEach(lights => {
    for (let i = 1; i <= 28; i++) {
      const span = document.createElement('span');
      span.className = `lamp-${i}`;
      lights.appendChild(span);
    }
  });
</script>

</body>
</html>
